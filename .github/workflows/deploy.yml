name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      # ── Step 1: Get the code 
      - name: Checkout
        uses: actions/checkout@v4

      # ── Step 2: Log in to GitHub Container Registry 
      # Uses the built-in GITHUB_TOKEN — no extra secrets needed for the push.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 3: Build and push the API image 
      # Builds from the repo root so the Dockerfile can also copy data/ for seeding.
      - name: Build and push API image
        run: |
          docker build \
            -f src/WristWise.API/Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/wristwise-api:latest \
            .
          docker push ghcr.io/${{ github.repository_owner }}/wristwise-api:latest

      # ── Step 4: Build the React frontend 
      # Produces a dist/ folder of static files. Nginx on the server serves
      # these directly — no separate client container needed.
      - name: Build frontend
        run: |
          cd src/WristWise.Client
          npm ci
          npm run build
          mv dist ../../dist

      # ── Step 5: Copy config and built frontend to the server 
      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx.conf,dist"
          target: /app

      # ── Step 6: Deploy 
      # SSHs into the server and:
      #   1. Writes the .env file from GitHub Secrets (never stored in git)
      #   2. Logs Docker into ghcr.io so it can pull the API image
      #   3. Pulls the latest image and restarts the containers
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /app

            # Write secrets to .env — this file is never committed to git
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env
            echo "JWT_KEY=${{ secrets.JWT_KEY }}" >> .env
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env
            echo "API_IMAGE=ghcr.io/${{ github.repository_owner }}/wristwise-api:latest" >> .env

            # Log Docker into ghcr.io to pull the API image
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the new image and restart containers
            docker compose pull
            docker compose up -d --remove-orphans
